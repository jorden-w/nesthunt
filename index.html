      --bg-2: #ECE6D5;

      --surface-2: #EDE8DA;

      --accent: #C84A2E;
      --accent-soft: #F2D9CC;
      --accent-deep: #9F3621;
      --warn: #C8881A;
      --warn-soft: #F4E2B8;
      --danger: #A33A2A;
      --danger-soft: #F0D5CE;
      --good: #4A7A3F;
      --good-soft: #D9E6D2;
      --shadow-sm: 0 1px 0 rgba(42,40,38,0.04);
      --shadow: 0 1px 0 rgba(42,40,38,0.04), 0 4px 16px rgba(42,40,38,0.06);
      --shadow-lg: 0 4px 24px rgba(42,40,38,0.10);
      --shadow-xl: 0 12px 40px rgba(42,40,38,0.16);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior-y: none; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'ss01', 'cv11';
    }
    #root { min-height: 100vh; }

    input, select, textarea, button {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }
    button {
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }
    button:active { transform: scale(0.97); }
    a { color: inherit; }
    h1, h2, h3, h4 { font-family: 'Fraunces', Georgia, serif; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .spin { animation: spin 1s linear infinite; }
    .fade-up { animation: fadeUp 0.3s ease; }
    .fade-in { animation: fadeIn 0.2s ease; }

    /* Range slider styling */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid var(--surface);
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      animation: fadeUp 0.3s ease;
      max-width: 90%;
      text-align: center;
    }
  </style>

      get: (k) => { try { return window.localStorage.getItem(k); } catch { return null; } },

      remove: (k) => { try { window.localStorage.removeItem(k); } catch {} },
    };
    function getDeviceId() {
      let id = ls.get(LOCAL_KEYS.deviceId);
      if (!id) { id = uid(); ls.set(LOCAL_KEYS.deviceId, id); }

    }
    function monthKey(d = new Date()) {
      return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
    }
    function timeAgo(ts) {
      if (!ts) return '';
      const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
      const s = Math.floor((Date.now() - t) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
      if (s < 604800) return `${Math.floor(s / 86400)}d ago`;
      return new Date(t).toLocaleDateString();
    }
    function fmtMoney(n) {
      if (n == null || n === '' || isNaN(n)) return null;
      return '$' + Math.round(Number(n)).toLocaleString();

    // ============= SUPABASE CLIENT =============
    let supabase = null;
    function initSupabase(url, key) {
      if (!url || !key) return null;
      try {
        supabase = window.supabase.createClient(url, key);
        return supabase;
      } catch (e) {
        console.error('Supabase init failed', e);
        return null;
      }
    }

    // ============= DATA ACCESS LAYER =============
    const db = {
      async getGroup() {
        const { data, error } = await supabase.from('groups').select('*').limit(1).maybeSingle();
        if (error) throw error;
        return data;
      },
      async createGroup(passphrase, deviceId) {
        const { data, error } = await supabase.from('groups').insert({
          passphrase,
          admin_device_id: deviceId,
          thresholds: DEFAULT_THRESHOLDS,
        }).select().single();
        if (error) throw error;
        return data;
      },
      async updateGroup(id, patch) {
        const { data, error } = await supabase.from('groups').update(patch).eq('id', id).select().single();
        if (error) throw error;
        return data;
      },
      async listRoommates(groupId) {
        const { data, error } = await supabase.from('roommates').select('*').eq('group_id', groupId).order('created_at');
        if (error) throw error;
        return data || [];
      },
      async upsertRoommate(rm) {
        const { data, error } = await supabase.from('roommates').upsert(rm).select().single();
        if (error) throw error;
        return data;
      },

        const ext = file.name.split('.').pop() || 'jpg';
        const path = `${listingId}/${uid()}.${ext}`;
        const { error: upErr } = await supabase.storage.from('listing-photos').upload(path, file, { cacheControl: '3600', upsert: false });

        const { data } = supabase.storage.from('listing-photos').getPublicUrl(path);
        return { url: data.publicUrl, path };
      },

        try { await supabase.storage.from('listing-photos').remove([path]); } catch (e) { console.warn(e); }

    // ============= URL META FETCH =============
    async function fetchListingMeta(url) {
      const result = { title: null, image: null, address: null, price: null, beds: null, baths: null, sqft: null, images: [] };
      try {
        const u = new URL(url);
        if (u.hostname.includes('zillow.com')) {
          const m = u.pathname.match(/\/homedetails\/([^/]+)\//);
          if (m) {
            const slug = m[1].replace(/-/g, ' ');
            result.address = slug.replace(/\b\w/g, c => c.toUpperCase());
          }
        }
      } catch {}

      try {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const resp = await fetch(proxy);
        if (resp.ok) {
          const data = await resp.json();
          const html = data.contents || '';
          const og = (prop) => {
            const re = new RegExp(`<meta[^>]+property=["']og:${prop}["'][^>]+content=["']([^"']+)["']`, 'i');
            const m = html.match(re);
            return m ? m[1].replace(/&amp;/g, '&') : null;
          };
          result.title = og('title') || result.title;
          result.image = og('image') || result.image;
          if (result.image) result.images.push(result.image);

          const imgMatches = [...html.matchAll(/<meta[^>]+property=["']og:image[^"']*["'][^>]+content=["']([^"']+)["']/gi)];
          imgMatches.forEach(m => {
            const clean = m[1].replace(/&amp;/g, '&');
            if (!result.images.includes(clean)) result.images.push(clean);
          });

          const priceMatch = html.match(/\$([0-9,]{3,7})\s*(?:\/\s*mo|per month|monthly)/i);
          if (priceMatch) result.price = parseInt(priceMatch[1].replace(/,/g, ''));
          const bedsMatch = html.match(/([0-9]+)\s*(?:bd|beds?|bedrooms?)\b/i);
          if (bedsMatch) result.beds = parseInt(bedsMatch[1]);
          const bathsMatch = html.match(/([0-9]+(?:\.[05])?)\s*(?:ba|baths?|bathrooms?)\b/i);
          if (bathsMatch) result.baths = parseFloat(bathsMatch[1]);
          const sqftMatch = html.match(/([0-9,]{3,5})\s*(?:sqft|sq\.?\s*ft|square\s*feet)/i);
          if (sqftMatch) result.sqft = parseInt(sqftMatch[1].replace(/,/g, ''));
        }
      } catch (e) {
        console.warn('OG fetch failed:', e);
      }
      return result;
    }

    // ============= IMAGE COMPRESSION =============
    async function compressImage(file, maxWidth = 1200, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxWidth / img.width);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            canvas.toBlob(blob => {
              if (!blob) return reject(new Error('compression failed'));
              const newFile = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' });
              resolve(newFile);
            }, 'image/jpeg', quality);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ============= GOOGLE MAPS HELPERS =============
    // Load Google Maps JS SDK on demand (cached after first load)
    let googleMapsLoadPromise = null;
    function loadGoogleMaps(apiKey) {
      if (googleMapsLoadPromise) return googleMapsLoadPromise;
      if (!apiKey) return Promise.reject(new Error('No API key'));
      googleMapsLoadPromise = new Promise((resolve, reject) => {
        if (window.google?.maps?.DistanceMatrixService) { resolve(window.google.maps); return; }
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(apiKey)}&libraries=places&loading=async&callback=__nh_gmaps_loaded`;
        script.async = true;
        script.defer = true;
        window.__nh_gmaps_loaded = () => {
          if (window.google?.maps) resolve(window.google.maps);
          else reject(new Error('Google Maps loaded but DistanceMatrixService not available'));
        };
        script.onerror = () => {
          googleMapsLoadPromise = null;
          reject(new Error('Failed to load Google Maps JS SDK — check your API key restrictions'));
        };
        document.head.appendChild(script);
      });
      return googleMapsLoadPromise;
    }

    async function getDriveTime(origin, destination, apiKey) {
      if (!apiKey || !origin || !destination) return null;
      try {
        const maps = await loadGoogleMaps(apiKey);
        const service = new maps.DistanceMatrixService();
        const result = await new Promise((resolve, reject) => {
          service.getDistanceMatrix({
            origins: [origin],
            destinations: [destination],
            travelMode: maps.TravelMode.DRIVING,
            unitSystem: maps.UnitSystem.IMPERIAL,
          }, (response, status) => {
            if (status !== 'OK') {
              reject(new Error('DistanceMatrix status: ' + status));
              return;
            }
            resolve(response);
          });
        });
        const el = result?.rows?.[0]?.elements?.[0];
        if (!el || el.status !== 'OK') {
          console.warn('Distance element status:', el?.status);
          return null;
        }
        return {
          minutes: Math.round(el.duration.value / 60),
          text: el.duration.text,
          distance: el.distance.text,
        };
      } catch (e) {
        console.warn('distance failed', e);
        return null;
      }
    }

    // ============= VIDEO EMBED URL =============
    function getEmbedUrl(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtube.com')) {
          const v = u.searchParams.get('v');
          if (v) return `https://www.youtube.com/embed/${v}`;
        }
        if (u.hostname === 'youtu.be') {
          return `https://www.youtube.com/embed${u.pathname}`;
        }
        if (u.hostname.includes('drive.google.com')) {
          const m = u.pathname.match(/\/d\/([^/]+)/);
          if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
        }
      } catch {}
      return null;
    }

    // ============= TOAST CONTEXT =============
    const ToastContext = React.createContext(() => {});
    function ToastProvider({ children }) {
      const [toast, setToast] = useState(null);
      const show = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2800);
      }, []);
      return (
        <ToastContext.Provider value={show}>
          {children}
          {toast && <div className="toast">{toast}</div>}
        </ToastContext.Provider>
      );
    }
    function useToast() { return React.useContext(ToastContext); }

    // ============= MAIN APP (stage router) =============
    function App() {
      const [stage, setStage] = useState('boot');
      const [group, setGroup] = useState(null);
      const [roommates, setRoommates] = useState([]);
      const [listings, setListings] = useState([]);
      const [me, setMe] = useState(null);
      const [deviceId] = useState(getDeviceId);

      // ============= BOOT =============
      useEffect(() => {
        (async () => {
          const sbUrl = ls.get(LOCAL_KEYS.sbUrl);
          const sbKey = ls.get(LOCAL_KEYS.sbKey);

          if (!sbUrl || !sbKey) {
            setStage('needs-supabase');
            return;
          }

          if (!initSupabase(sbUrl, sbKey)) {
            setStage('needs-supabase');
            return;
          }

          // Check for existing group
          try {
            const g = await db.getGroup();
            if (!g) {
              setStage('needs-passphrase-create');
              return;
            }
            setGroup(g);

            // Check API counter reset
            await checkApiCounterReset(g);

            // Check unlock token
            const unlock = ls.get(LOCAL_KEYS.unlocked);
            if (unlock !== g.passphrase) {
              setStage('locked');
              return;
            }

            // Load data
            await loadAll(g.id);

            // Check name
            const savedName = ls.get(LOCAL_KEYS.name);
            if (!savedName) {
              setStage('setup-me');
              return;
            }
            setMe(savedName);
            setStage('ready');
          } catch (e) {
            console.error(e);
            setStage('needs-supabase');
          }
        })();
      }, []);

      async function checkApiCounterReset(g) {
        const lastReset = g.api_calls_reset_at ? new Date(g.api_calls_reset_at) : null;
        const currentMonth = monthKey();
        const lastMonth = lastReset ? monthKey(lastReset) : null;
        if (lastMonth !== currentMonth) {
          await db.updateGroup(g.id, { api_calls_used: 0, api_calls_reset_at: new Date().toISOString() });
          g.api_calls_used = 0;
          g.api_calls_reset_at = new Date().toISOString();
        }
      }

      async function loadAll(groupId) {
        const [rms, lts] = await Promise.all([
          db.listRoommates(groupId),
          db.listListings(groupId),
        ]);
        setRoommates(rms);
        setListings(lts);
      }

      // ============= STAGE RENDERS =============
      if (stage === 'boot') {
        return <BootScreen />;
      }
      if (stage === 'needs-supabase') {
        return <SupabaseSetupScreen onSaved={(url, key) => {
          ls.set(LOCAL_KEYS.sbUrl, url);
          ls.set(LOCAL_KEYS.sbKey, key);
          window.location.reload();
        }} />;
      }
      if (stage === 'needs-passphrase-create') {
        return <CreatePassphraseScreen onCreate={async (passphrase) => {
          const g = await db.createGroup(passphrase, deviceId);
          ls.set(LOCAL_KEYS.unlocked, passphrase);
          setGroup(g);
          setStage('setup-me');
        }} />;
      }
      if (stage === 'locked') {
        return <UnlockScreen
          expected={group.passphrase}
          onUnlock={() => {
            ls.set(LOCAL_KEYS.unlocked, group.passphrase);
            setStage('setup-me');
            loadAll(group.id);
          }}
        />;
      }
      if (stage === 'setup-me') {
        return <SetupMeScreen
          existingRoommates={roommates.length ? roommates : []}
          onComplete={async (name, commuteAddress, claimExisting) => {
            ls.set(LOCAL_KEYS.name, name);
            setMe(name);
            if (claimExisting) {
              const existing = roommates.find(r => r.name === name);
              if (existing && commuteAddress && commuteAddress !== existing.commute_address) {
                await db.upsertRoommate({ ...existing, commute_address: commuteAddress });
                await loadAll(group.id);
              }
            } else {
              await db.upsertRoommate({ group_id: group.id, name, commute_address: commuteAddress });
              await loadAll(group.id);
            }
            setStage('ready');
          }}
        />;
      }

      // Default case: render the main app shell
      return (
        <MainAppShell
          group={group}
          setGroup={setGroup}
          roommates={roommates}
          listings={listings}
          me={me}
          setMe={setMe}
          deviceId={deviceId}
          reloadAll={() => loadAll(group.id)}
        />
      );
    }

    // ============= MAIN APP SHELL (only rendered when stage === 'ready') =============
    function MainAppShell({ group, setGroup, roommates, listings, me, setMe, deviceId, reloadAll }) {
      const [view, setView] = useState('list');
      const [selectedId, setSelectedId] = useState(null);
      const [pendingListing, setPendingListing] = useState(null);
      const [fetchingMeta, setFetchingMeta] = useState(false);

      const [sortBy, setSortBy] = useState('newest');
      const [showRejected, setShowRejected] = useState(true);
      const [showSummary, setShowSummary] = useState(true);
      const [filters, setFilters] = useState({
        status: 'all',
        propertyTypes: { house: true, townhouse: true, condo: true },
        maxRentPerPerson: null,
        minSqftPerPerson: null,
        minBeds: null,
        minBaths: null,
        minRating: 0,
      });

      const isAdmin = group && group.admin_device_id === deviceId;

      // Realtime subscriptions
      useEffect(() => {
        if (!group) return;
        const channel = supabase.channel('group-' + group.id)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'listings', filter: `group_id=eq.${group.id}` }, () => reloadAll())
          .on('postgres_changes', { event: '*', schema: 'public', table: 'roommates', filter: `group_id=eq.${group.id}` }, () => reloadAll())
          .on('postgres_changes', { event: '*', schema: 'public', table: 'groups', filter: `id=eq.${group.id}` }, async () => {
            const g = await db.getGroup(); if (g) setGroup(g);
          })
          .subscribe();
        return () => supabase.removeChannel(channel);
      }, [group?.id]);

      async function handleAddLink(url) {
        setFetchingMeta(true);
        const meta = await fetchListingMeta(url);
        setPendingListing({
          isNew: true,
          group_id: group.id,
          added_by: me,
          url,
          title: meta.title || '',
          address: meta.address || '',
          cover_image: meta.image || '',
          images: meta.images || [],
          video_links: [],
          rent: meta.price || '',
          beds: meta.beds || '',
          baths: meta.baths || '',
          sqft: meta.sqft || '',
          property_type: 'house',
          move_in_date: '',
          lease_length: '',
          parking: '',
          laundry: 'unknown',
          notes: '',
          status: 'New',
          ratings: {},
          drive_times: {},
          drive_time_cache: {},
        });
        setFetchingMeta(false);
        setView('confirm');
      }

      async function saveListing(listing) {
        const dt = await computeDriveTimesForListing(listing);
        listing.drive_times = dt.driveTimes;
        listing.drive_time_cache = dt.cache;

        // Strip computed/derived fields that don't exist in the DB schema
        const DB_COLUMNS = new Set([
          'id', 'group_id', 'added_by', 'url', 'title', 'address', 'cover_image',
          'images', 'video_links', 'rent', 'beds', 'baths', 'sqft', 'property_type',
          'move_in_date', 'lease_length', 'parking', 'laundry', 'notes', 'status',
          'ratings', 'drive_times', 'drive_time_cache', 'created_at', 'updated_at',
        ]);
        const cleanPayload = (obj) => {
          const out = {};
          for (const k of Object.keys(obj)) {
            if (DB_COLUMNS.has(k)) out[k] = obj[k];
          }
          return out;
        };

        if (listing.isNew) {
          const payload = cleanPayload(listing);
          delete payload.id;
          delete payload.created_at;
          delete payload.updated_at;
          payload.rent = payload.rent ? Number(payload.rent) : null;
          payload.beds = payload.beds ? Number(payload.beds) : null;
          payload.baths = payload.baths ? Number(payload.baths) : null;
          payload.sqft = payload.sqft ? Number(payload.sqft) : null;
          payload.move_in_date = payload.move_in_date || null;
          await db.createListing(payload);
        } else {
          const patch = cleanPayload(listing);
          const id = patch.id;
          delete patch.id;
          delete patch.created_at;
          delete patch.updated_at;
          patch.rent = patch.rent ? Number(patch.rent) : null;
          patch.beds = patch.beds ? Number(patch.beds) : null;
          patch.baths = patch.baths ? Number(patch.baths) : null;
          patch.sqft = patch.sqft ? Number(patch.sqft) : null;
          patch.move_in_date = patch.move_in_date || null;
          await db.updateListing(id, patch);
        }
        await reloadAll();
        setPendingListing(null);
        setView('list');
      }

      async function computeDriveTimesForListing(listing) {
        const cache = listing.drive_time_cache || {};
        const driveTimes = { ...(listing.drive_times || {}) };
        const apiKey = group.api_key;
        if (!apiKey || !listing.address) return { driveTimes, cache };

        let callsUsed = group.api_calls_used || 0;
        for (const rm of roommates) {
          if (!rm.commute_address) continue;
          const cacheKey = `${rm.name}::${rm.commute_address}::${listing.address}`;
          if (cache[cacheKey]) {
            driveTimes[rm.name] = cache[cacheKey];
            continue;
          }
          if (callsUsed >= API_CAP) continue;
          const dt = await getDriveTime(listing.address, rm.commute_address, apiKey);
          if (dt) {
            callsUsed++;
            driveTimes[rm.name] = dt;
            cache[cacheKey] = dt;
          }
        }

        if (callsUsed !== (group.api_calls_used || 0)) {
          const updated = await db.updateGroup(group.id, { api_calls_used: callsUsed });
          setGroup(updated);
        }
        return { driveTimes, cache };
      }

      async function recomputeAllDriveTimesForRoommate(rmName, newCommute, oldCommute) {
        if (newCommute === oldCommute) return;
        const apiKey = group.api_key;
        if (!apiKey) return;
        let callsUsed = group.api_calls_used || 0;
        for (const l of listings) {
          if (!l.address) continue;
          const newCacheKey = `${rmName}::${newCommute}::${l.address}`;
          const cache = l.drive_time_cache || {};
          const dt = l.drive_times || {};
          if (cache[newCacheKey]) {
            dt[rmName] = cache[newCacheKey];
          } else {
            if (callsUsed >= API_CAP) {
              delete dt[rmName];
              continue;
            }
            const t = await getDriveTime(l.address, newCommute, apiKey);
            if (t) { callsUsed++; dt[rmName] = t; cache[newCacheKey] = t; }
            else delete dt[rmName];
          }
          await db.updateListing(l.id, { drive_times: dt, drive_time_cache: cache });
        }
        if (callsUsed !== (group.api_calls_used || 0)) {
          const updated = await db.updateGroup(group.id, { api_calls_used: callsUsed });
          setGroup(updated);
        }
        await reloadAll();
      }

      async function rateMyself(id, stars) {
        const l = listings.find(x => x.id === id);
        if (!l) return;
        const ratings = { ...l.ratings, [me]: stars };
        await db.updateListing(id, { ratings });
        await reloadAll();
      }

      async function updateStatus(id, status) {
        await db.updateListing(id, { status });
        await reloadAll();
      }

      async function deleteListingHandler(id) {
        if (!confirm('Delete this listing for everyone?')) return;
        await db.deleteListing(id);
        setView('list');
        setSelectedId(null);
        await reloadAll();
      }

      const thresholds = group?.thresholds || DEFAULT_THRESHOLDS;
      const numRoommates = roommates.length || 4;

      const enriched = useMemo(() => listings.map(l => {
        const rent = parseFloat(l.rent) || 0;
        const sqft = parseFloat(l.sqft) || 0;
        const beds = parseFloat(l.beds) || 0;
        const baths = parseFloat(l.baths) || 0;

        const rentPP4 = rent ? rent / 4 : 0;
        const rentPP3 = rent ? rent / 3 : 0;
        const sqftPP = sqft && beds ? sqft / beds : 0;
        const bedsPerBath = beds && baths ? beds / baths : 0;

        const ratings = Object.values(l.ratings || {}).filter(r => typeof r === 'number');
        const avgRating = ratings.length ? ratings.reduce((a, b) => a + b, 0) / ratings.length : 0;

        // Per-roommate commute fails
        const commuteOverNames = [];
        for (const rm of roommates) {
          if (rm.max_commute_minutes == null) continue;
          const dt = l.drive_times?.[rm.name];
          if (dt && dt.minutes > rm.max_commute_minutes) {
            commuteOverNames.push(rm.name);
          }
        }

        const fails = {
          rent: rent > 0 && rentPP4 > thresholds.maxRentPerPerson && rentPP3 > thresholds.maxRentPerPerson,
          rentPP3Only: rent > 0 && rentPP3 > thresholds.maxRentPerPerson && rentPP4 <= thresholds.maxRentPerPerson,
          sqft: sqft > 0 && beds > 0 && sqftPP < thresholds.minSqftPerPerson,
          baths: beds > 0 && baths > 0 && bedsPerBath > thresholds.maxBedsPerBath,
          beds: beds > 0 && beds < thresholds.minBeds,
          laundry: l.laundry === 'no',
          commute: commuteOverNames.length > 0,
        };
        const failCount = Object.values(fails).filter(Boolean).length - (fails.rentPP3Only ? 1 : 0);

        return { ...l, rentPP4, rentPP3, sqftPP, bedsPerBath, avgRating, ratingCount: ratings.length, fails, failCount, commuteOverNames };
      }), [listings, thresholds, roommates]);

      const visible = useMemo(() => {
        let arr = [...enriched];
        if (!showRejected) arr = arr.filter(l => l.status !== 'Rejected');
        if (filters.status !== 'all') arr = arr.filter(l => l.status === filters.status);
        arr = arr.filter(l => !l.property_type || filters.propertyTypes[l.property_type]);
        if (filters.maxRentPerPerson != null) arr = arr.filter(l => !l.rentPP4 || l.rentPP4 <= filters.maxRentPerPerson);
        if (filters.minSqftPerPerson != null) arr = arr.filter(l => !l.sqftPP || l.sqftPP >= filters.minSqftPerPerson);
        if (filters.minBeds != null) arr = arr.filter(l => !l.beds || l.beds >= filters.minBeds);
        if (filters.minBaths != null) arr = arr.filter(l => !l.baths || l.baths >= filters.minBaths);
        if (filters.minRating > 0) arr = arr.filter(l => l.avgRating >= filters.minRating);

        if (sortBy === 'newest') arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        if (sortBy === 'rating') arr.sort((a, b) => b.avgRating - a.avgRating);
        if (sortBy === 'rentPerPerson') arr.sort((a, b) => (a.rentPP4 || Infinity) - (b.rentPP4 || Infinity));
        return arr;
      }, [enriched, sortBy, showRejected, filters]);

      const summary = useMemo(() => {
        const total = enriched.length;
        const touring = enriched.filter(l => l.status === 'Touring').length;
        const top = enriched.filter(l => l.status === 'Top Choice').length;
        const best = [...enriched].filter(l => l.ratingCount > 0).sort((a, b) => b.avgRating - a.avgRating)[0];
        return { total, touring, top, best };
      }, [enriched]);

      const activeFilterCount = useMemo(() => {
        let n = 0;
        if (filters.status !== 'all') n++;
        if (!filters.propertyTypes.house || !filters.propertyTypes.townhouse || !filters.propertyTypes.condo) n++;
        if (filters.maxRentPerPerson != null) n++;
        if (filters.minSqftPerPerson != null) n++;
        if (filters.minBeds != null) n++;
        if (filters.minBaths != null) n++;
        if (filters.minRating > 0) n++;
        return n;
      }, [filters]);

      const selected = selectedId ? enriched.find(l => l.id === selectedId) : null;

      return (
        <div style={{ paddingBottom: 88 }}>
          <Header
            view={view}
            me={me}
            isAdmin={isAdmin}
            onSettings={() => setView('settings')}
            onBack={() => { setView('list'); setSelectedId(null); setPendingListing(null); }}
          />

          {view === 'list' && (
            <ListView
              listings={visible}
              allCount={enriched.length}
              summary={summary}
              showSummary={showSummary}
              setShowSummary={setShowSummary}
              sortBy={sortBy}
              setSortBy={setSortBy}
              filters={filters}
              setFilters={setFilters}
              activeFilterCount={activeFilterCount}
              showRejected={showRejected}
              setShowRejected={setShowRejected}
              thresholds={thresholds}
              roommates={roommates}
              me={me}
              onSelect={(id) => { setSelectedId(id); setView('detail'); }}
              onAdd={() => setView('add')}
            />
          )}

          {view === 'add' && (
            <AddView onSubmit={handleAddLink} fetching={fetchingMeta} onCancel={() => setView('list')} />
          )}

          {view === 'confirm' && pendingListing && (
            <ConfirmView
              listing={pendingListing}
              onChange={setPendingListing}
              onSave={() => saveListing(pendingListing)}
              onCancel={() => { setPendingListing(null); setView('list'); }}
            />
          )}

          {view === 'detail' && selected && (
            <DetailView
              listing={selected}
              roommates={roommates}
              me={me}
              thresholds={thresholds}
              numRoommates={numRoommates}
              onRate={(stars) => rateMyself(selected.id, stars)}
              onUpdateStatus={(s) => updateStatus(selected.id, s)}
              onEdit={() => { setPendingListing({ ...selected, isNew: false }); setView('confirm'); }}
              onDelete={() => deleteListingHandler(selected.id)}
              onRefreshComments={() => reloadAll()}
            />
          )}

          {view === 'settings' && (
            <SettingsView
              group={group}
              setGroup={async (patch) => {
                const updated = await db.updateGroup(group.id, patch);
                setGroup(updated);
              }}
              isAdmin={isAdmin}
              deviceId={deviceId}
              roommates={roommates}
              setRoommates={async () => reloadAll()}
              me={me}
              onChangeMe={(name) => { ls.set(LOCAL_KEYS.name, name); setMe(name); }}
              listings={listings}
              onCommuteChange={recomputeAllDriveTimesForRoommate}
            />
          )}

          {view === 'list' && (
            <button onClick={() => setView('add')} style={styles.fab} aria-label="Add listing">
              <IconPlus size={26} strokeWidth={2.5} />
            </button>
          )}
        </div>
      );
    }

    // ============= BOOT SCREEN =============
    function BootScreen() {
      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 12 }}>
          <div style={{ fontFamily: 'Fraunces, serif', fontSize: 48, color: 'var(--accent)', fontWeight: 900 }}>◐</div>
          <div style={{ color: 'var(--muted)', fontSize: 14 }}>loading nest hunt...</div>
        </div>
      );
    }

    // ============= SUPABASE SETUP =============
    function SupabaseSetupScreen({ onSaved }) {
      const [url, setUrl] = useState('');
      const [key, setKey] = useState('');
      const [showKey, setShowKey] = useState(false);
      const [testing, setTesting] = useState(false);
      const [error, setError] = useState(null);

      async function test() {
        setError(null);
        setTesting(true);
        try {
          const tempClient = window.supabase.createClient(url, key);
          const { error } = await tempClient.from('groups').select('id').limit(1);
          if (error) throw error;
          onSaved(url.trim(), key.trim());
        } catch (e) {
          setError(e.message || 'Could not connect. Check the URL and key.');
        } finally {
          setTesting(false);
        }
      }

      return (
        <div style={styles.setupWrap}>
          <div style={styles.setupCard}>
            <div style={styles.logoMark}>◐</div>
            <h1 style={styles.setupTitle}>welcome to nest hunt</h1>
            <p style={styles.setupSub}>
              one-time setup. paste your Supabase project URL and anon key.
              you only do this once per device.
            </p>
            <Field label="supabase project URL">
              <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxxxx.supabase.co" style={styles.input} autoFocus />
            </Field>
            <Field label="supabase anon key">
              <div style={{ position: 'relative' }}>
                <input
                  type={showKey ? 'text' : 'password'}
                  value={key}
                  onChange={e => setKey(e.target.value)}
                  placeholder="eyJhbGciOiJI..."
                  style={{ ...styles.input, paddingRight: 44 }}
                />
                <button onClick={() => setShowKey(!showKey)} style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', padding: 6, color: 'var(--muted)' }}>
                  {showKey ? <IconEyeOff size={16} /> : <IconEye size={16} />}
                </button>
              </div>
            </Field>
            {error && <div style={{ color: 'var(--danger)', fontSize: 13, marginTop: 8 }}>{error}</div>}

    // ============= SETUP ME =============
    function SetupMeScreen({ existingRoommates, onComplete }) {
      const [step, setStep] = useState(0);

      const [nameError, setNameError] = useState(null);

      const claiming = existingRoommates.find(r => r.name.toLowerCase() === name.toLowerCase().trim());

      function checkName() {
        const trimmed = name.trim();
        if (!trimmed) { setNameError('enter a name'); return false; }
        if (trimmed.length < 2) { setNameError('name too short'); return false; }

        return true;

      return (
        <div style={styles.setupWrap}>
          <div style={styles.setupCard}>

                    onChange={e => { setName(e.target.value); setNameError(null); }}

    // ============= CONFIRM VIEW =============
    function ConfirmView({ listing, onChange, onSave, onCancel }) {
      const set = (k, v) => onChange({ ...listing, [k]: v });
      const [saving, setSaving] = useState(false);
      const [uploading, setUploading] = useState(false);
      const [newVideoUrl, setNewVideoUrl] = useState('');
      const fileInputRef = useRef(null);

      const images = listing.images || [];
      const videos = listing.video_links || [];

      function addImageUrl() {
        const url = prompt('Paste image URL:');
        if (url?.trim()) {
          const next = [...images, url.trim()];
          set('images', next);
          if (!listing.cover_image) set('cover_image', url.trim());
        }
      }

      function setCover(url) { onChange({ ...listing, cover_image: url }); }
      function removeImage(idx) {
        const next = images.filter((_, i) => i !== idx);
        const removed = images[idx];
        const patch = { ...listing, images: next };
        if (listing.cover_image === removed) {
          patch.cover_image = next[0] || '';
        }
        onChange(patch);
      }

      async function handleFiles(e) {
        const files = Array.from(e.target.files || []);
        if (!files.length) return;
        setUploading(true);
        const tempId = listing.id || 'staging';
        const uploaded = [];
        for (const f of files) {
          try {
            const compressed = await compressImage(f);
            const { url } = await db.uploadPhoto(compressed, tempId);
            uploaded.push(url);
          } catch (err) {
            console.error('upload failed', err);
            alert('Upload failed for one or more files: ' + err.message);
          }
        }
        const next = [...images, ...uploaded];
        const patch = { ...listing, images: next };
        if (!listing.cover_image && uploaded[0]) patch.cover_image = uploaded[0];
        onChange(patch);
        setUploading(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      }

      function addVideo() {
        if (!newVideoUrl.trim()) return;
        set('video_links', [...videos, newVideoUrl.trim()]);
        setNewVideoUrl('');
      }
      function removeVideo(idx) {
        set('video_links', videos.filter((_, i) => i !== idx));
      }

      return (
        <main style={styles.main}>
          <div style={styles.formCard}>

              <Field label="rent ($/mo)">

              </Field>
              <Field label="property type">
                <select value={listing.property_type} onChange={e => set('property_type', e.target.value)} style={styles.input}>
                  <option value="house">house</option>
                  <option value="townhouse">townhouse</option>
                  <option value="condo">condo</option>

            <div style={styles.fieldRow}>
              <Field label="beds">
                <input type="number" value={listing.beds || ''} onChange={e => set('beds', e.target.value)} style={styles.input} />

              <Field label="baths">
                <input type="number" step="0.5" value={listing.baths || ''} onChange={e => set('baths', e.target.value)} style={styles.input} />

                <input type="number" value={listing.sqft || ''} onChange={e => set('sqft', e.target.value)} style={styles.input} />

            <div style={styles.fieldRow}>
              <Field label="move-in date">
                <input type="date" value={listing.move_in_date || ''} onChange={e => set('move_in_date', e.target.value)} style={styles.input} />

              <Field label="lease length">
                <input value={listing.lease_length || ''} onChange={e => set('lease_length', e.target.value)} style={styles.input} placeholder="12 months" />

            <div style={styles.fieldRow}>
              <Field label="parking">
                <input value={listing.parking || ''} onChange={e => set('parking', e.target.value)} style={styles.input} placeholder="2-car garage" />

              <Field label="laundry">
                <select value={listing.laundry || 'unknown'} onChange={e => set('laundry', e.target.value)} style={styles.input}>
                  <option value="unknown">unknown</option>

            {/* Photos */}
            <div style={styles.field}>
              <label style={styles.label}>photos ({images.length})</label>

                  <div key={i} style={{ ...styles.photoTile, ...(listing.cover_image === img ? styles.photoTileCover : {}) }}>

                  <span style={{ fontSize: 11 }}>URL</span>
                </button>

                  {uploading ? <span className="spin"><IconRefresh size={20} /></span> : <IconUpload size={20} />}
                  <span style={{ fontSize: 11 }}>{uploading ? 'uploading' : 'device'}</span>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    multiple
                    onChange={handleFiles}

            {/* Videos */}

                <div key={i} style={styles.videoRow}>
                  <IconVideo size={14} />

    // ============= DETAIL VIEW =============
    function DetailView({ listing, roommates, me, thresholds, numRoommates, onRate, onUpdateStatus, onEdit, onDelete, onRefreshComments }) {
      const [comments, setComments] = useState([]);
      const [commentText, setCommentText] = useState('');
      const [imgIdx, setImgIdx] = useState(0);
      const [imgError, setImgError] = useState({});

      const myRating = listing.ratings?.[me];
      const status = STATUS_STYLES[listing.status];
      const f = listing.fails;
      const images = listing.images?.length ? listing.images : (listing.cover_image ? [listing.cover_image] : []);
      const videos = listing.video_links || [];

      // Reorder: cover first
      const orderedImages = useMemo(() => {
        if (!listing.cover_image) return images;
        const rest = images.filter(i => i !== listing.cover_image);
        return [listing.cover_image, ...rest];
      }, [images, listing.cover_image]);

      // Live subscribe to comments
      useEffect(() => {
        let cancelled = false;
        (async () => {
          const c = await db.listComments(listing.id);
          if (!cancelled) setComments(c);
        })();
        const ch = supabase.channel('comments-' + listing.id)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'comments', filter: `listing_id=eq.${listing.id}` }, async () => {
            const c = await db.listComments(listing.id);
            if (!cancelled) setComments(c);
          })
          .subscribe();
        return () => { cancelled = true; supabase.removeChannel(ch); };
      }, [listing.id]);

      async function postComment() {
        if (!commentText.trim()) return;
        await db.addComment({ listing_id: listing.id, author: me, text: commentText.trim() });
        setCommentText('');
      }
      async function deleteComment(id) {
        if (!confirm('Delete this comment?')) return;
        await db.deleteComment(id);
      }

      return (
        <main style={styles.main}>
          {orderedImages.length > 0 && (
            <div style={styles.detailImageWrap}>
              {imgError[orderedImages[imgIdx]] ? (
                <div style={{ ...styles.detailImage, background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted)' }}>
                  image unavailable
                </div>
              ) : (
                <img
                  src={orderedImages[imgIdx]}
                  alt=""
                  style={styles.detailImage}
                  onError={() => setImgError({ ...imgError, [orderedImages[imgIdx]]: true })}
                />
              )}
              {orderedImages.length > 1 && (
                <>
                  <div style={styles.imageDots}>
                    {orderedImages.map((_, i) => (
                      <button key={i} onClick={() => setImgIdx(i)} style={{ ...styles.imageDot, opacity: i === imgIdx ? 1 : 0.4 }} />
                    ))}
                  </div>
                  <div style={styles.imageCounter}>{imgIdx + 1}/{orderedImages.length}</div>
                </>
              )}
            </div>
          )}

          <div style={styles.detailHeader}>
            <h1 style={styles.detailTitle}>{listing.address || listing.title || 'untitled'}</h1>
            {listing.url && (
              <a href={listing.url} target="_blank" rel="noopener noreferrer" style={styles.detailLink}>
                original listing <IconExt size={12} />
              </a>
            )}
          </div>

          <div style={styles.detailStatusRow}>
            <select
              value={listing.status}
              onChange={e => onUpdateStatus(e.target.value)}
              style={{ ...styles.statusSelect, background: status.bg, color: status.fg }}
            >
              {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <button onClick={onEdit} style={styles.iconBtn} aria-label="edit"><IconEdit size={16} /></button>
            <button onClick={onDelete} style={{ ...styles.iconBtn, color: 'var(--danger)' }} aria-label="delete"><IconTrash size={16} /></button>
          </div>

          {listing.failCount > 0 && (
            <div style={styles.flagsBox}>
              {f.rent && <FailRow text={`Rent over $${thresholds.maxRentPerPerson}/person (4-way and 3-way splits)`} />}
              {f.rentPP3Only && <FailRow text={`Only fits as 4-person split — over $${thresholds.maxRentPerPerson} when split 3 ways`} mild />}
              {f.sqft && <FailRow text={`Under ${thresholds.minSqftPerPerson} sqft/person`} />}
              {f.baths && <FailRow text={`More than ${thresholds.maxBedsPerBath} beds sharing one bath`} />}
              {f.beds && <FailRow text={`Fewer than ${thresholds.minBeds} beds`} />}
              {f.laundry && <FailRow text={`No in-unit laundry`} />}
              {f.commute && <FailRow text={`Commute exceeds max for: ${listing.commuteOverNames.join(', ')}`} />}
            </div>
          )}

          <div style={styles.statsGrid}>
            <Stat icon={<IconDollar size={16} />} label="rent" value={listing.rent ? `$${parseInt(listing.rent).toLocaleString()}/mo` : '—'} fail={f.rent} />
            <Stat icon={<IconBed size={16} />} label="beds" value={listing.beds ?? '—'} fail={f.beds} />
            <Stat icon={<IconBath size={16} />} label="baths" value={listing.baths ?? '—'} fail={f.baths} />
            <Stat icon={<IconSquare size={16} />} label="sqft" value={listing.sqft ? listing.sqft.toLocaleString() : '—'} fail={f.sqft} />
            <Stat icon={<IconDollar size={16} />} label="$/person (4)" value={listing.rentPP4 ? `$${Math.round(listing.rentPP4)}` : '—'} fail={f.rent} />
            <Stat icon={<IconDollar size={16} />} label="$/person (3)" value={listing.rentPP3 ? `$${Math.round(listing.rentPP3)}` : '—'} fail={f.rent || f.rentPP3Only} />
            <Stat icon={<IconSquare size={16} />} label="sqft/person" value={listing.sqftPP ? Math.round(listing.sqftPP) : '—'} fail={f.sqft} />
            <Stat icon={<IconHome size={16} />} label="type" value={listing.property_type || '—'} />
            {listing.parking && <Stat icon={<IconCar size={16} />} label="parking" value={listing.parking} />}
            {listing.laundry && listing.laundry !== 'unknown' && <Stat label="laundry" value={listing.laundry} fail={f.laundry} />}
            {listing.move_in_date && <Stat icon={<IconCal size={16} />} label="move-in" value={listing.move_in_date} />}
            {listing.lease_length && <Stat icon={<IconCal size={16} />} label="lease" value={listing.lease_length} />}
          </div>

          {Object.keys(listing.drive_times || {}).length > 0 && (
            <Section title="commute times">
              {Object.entries(listing.drive_times).map(([name, dt]) => {
                const rm = roommates.find(r => r.name === name);
                const maxM = rm?.max_commute_minutes;
                const over = maxM != null && dt.minutes > maxM;
                return (
                  <div key={name} style={styles.commuteRow}>
                    <IconCar size={14} />
                    <strong>{name}</strong>
                    <span style={{ color: 'var(--muted)' }}>·</span>
                    <span style={over ? styles.failText : null}>{dt.text}</span>
                    <span style={{ color: 'var(--muted)', fontSize: 12 }}>({dt.distance})</span>
                    {maxM != null && (
                      <span style={{ color: over ? 'var(--danger)' : 'var(--muted)', fontSize: 11, marginLeft: 'auto' }}>
                        max: {maxM}m
                      </span>
                    )}
                  </div>
                );
              })}
            </Section>
          )}

          {videos.length > 0 && (
            <Section title={`tour videos (${videos.length})`}>
              {videos.map((v, i) => {
                const embed = getEmbedUrl(v);
                return (
                  <div key={i} style={{ marginBottom: 10 }}>
                    {embed ? (
                      <div style={styles.videoEmbed}>
                        <iframe src={embed} title={`video ${i+1}`} frameBorder="0" allow="autoplay; encrypted-media" allowFullScreen style={{ width: '100%', height: '100%', border: 0 }} />
                      </div>
                    ) : (
                      <a href={v} target="_blank" rel="noopener noreferrer" style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--accent)', fontSize: 14 }}>
                        <IconVideo size={14} /> open video <IconExt size={12} />
                      </a>
                    )}
                  </div>
                );
              })}
            </Section>
          )}

          {listing.notes && (
            <Section title="notes">
              <p style={styles.notesText}>{listing.notes}</p>
            </Section>
          )}

          <Section title={`your rating ${me ? `(${me})` : ''}`}>
            <StarRater value={myRating || 0} onChange={onRate} large />
            {Object.keys(listing.ratings || {}).length > 0 && (
              <div style={styles.allRatings}>
                {Object.entries(listing.ratings).map(([name, stars]) => (
                  <div key={name} style={styles.ratingRow}>
                    <span>{name}</span>
                    <span style={{ display: 'flex', alignItems: 'center', gap: 4, color: 'var(--accent)' }}>
                      <IconStar size={12} filled /> {stars}
                    </span>
                  </div>
                ))}
                <div style={{ ...styles.ratingRow, fontWeight: 600, borderTop: '1px solid var(--border)', paddingTop: 8, marginTop: 4 }}>
                  <span>group avg</span>
                  <span>{listing.avgRating.toFixed(2)}/5</span>
                </div>
              </div>
            )}
          </Section>

          <Section title={`discussion (${comments.length})`}>
            <div style={styles.commentsList}>
              {comments.map(c => (
                <div key={c.id} style={styles.comment}>
                  <div style={styles.commentHeader}>
                    <strong>{c.author}</strong>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={styles.commentTime}>{timeAgo(c.created_at)}</span>
                      {c.author === me && (
                        <button onClick={() => deleteComment(c.id)} style={{ color: 'var(--muted)', padding: 2 }}><IconTrash size={12} /></button>
                      )}
                    </div>
                  </div>
                  <div style={styles.commentText}>{c.text}</div>
                </div>
              ))}
              {comments.length === 0 && (
                <p style={{ color: 'var(--muted)', fontStyle: 'italic', fontSize: 14 }}>no comments yet — start the discussion.</p>
              )}
            </div>
            <div style={styles.commentForm}>
              <input
                value={commentText}
                onChange={e => setCommentText(e.target.value)}
                placeholder="add a comment..."
                style={styles.input}
                onKeyDown={e => { if (e.key === 'Enter') postComment(); }}
              />
              <button
                onClick={postComment}
                style={{ ...styles.iconBtnFilled, opacity: commentText.trim() ? 1 : 0.4 }}
                disabled={!commentText.trim()}
              >
                <IconChat size={16} />
              </button>
            </div>
          </Section>

          <div style={{ height: 40 }} />
        </main>
      );
    }

    function FailRow({ text, mild }) {
      return (
        <div style={{ ...styles.flagItem, color: mild ? 'var(--warn)' : 'var(--danger)' }}>
          <IconAlert size={14} /> {text}
        </div>
      );
    }

    function Stat({ icon, label, value, fail }) {
      return (
        <div style={styles.stat}>
          <div style={styles.statLabel}>{icon}{label}</div>
          <div style={{ ...styles.statValue, ...(fail ? styles.failText : {}) }}>{value}</div>
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <section style={styles.section}>
          <h3 style={styles.sectionTitle}>{title}</h3>
          {children}
        </section>
      );
    }

    function StarRater({ value, onChange, large }) {
      const [hover, setHover] = useState(0);
      const display = hover || value;
      const size = large ? 32 : 18;
      return (
        <div style={{ display: 'flex', gap: 4 }}>
          {[1, 2, 3, 4, 5].map(n => (
            <button
              key={n}
              onClick={() => onChange(n)}
              onMouseEnter={() => setHover(n)}
              onMouseLeave={() => setHover(0)}
              style={{ padding: 4, color: n <= display ? 'var(--accent)' : 'var(--border)' }}
              aria-label={`Rate ${n} stars`}
            >
              <IconStar size={size} filled={n <= display} />
            </button>
          ))}
        </div>
      );
    }

    // ============= SETTINGS =============
    function SettingsView({ group, setGroup, isAdmin, deviceId, roommates, setRoommates, me, onChangeMe, listings, onCommuteChange }) {
      const [keyDraft, setKeyDraft] = useState(group.api_key || '');
      const [showKey, setShowKey] = useState(false);
      const [passDraft, setPassDraft] = useState(group.passphrase || '');
      const [thresholdDraft, setThresholdDraft] = useState(group.thresholds || DEFAULT_THRESHOLDS);
      const [newName, setNewName] = useState('');
      const [newCommute, setNewCommute] = useState('');
      const [copied, setCopied] = useState(false);

      const callsUsed = group.api_calls_used || 0;
      const callsPct = Math.min(100, (callsUsed / API_CAP) * 100);

      async function saveKey() {
        await setGroup({ api_key: keyDraft });
        alert('API key saved.');
      }
      async function rotatePassphrase() {
        if (!passDraft.trim() || passDraft === group.passphrase) return;
        if (!confirm('Rotating the passphrase will sign everyone out — they\'ll need the new phrase to get back in. Continue?')) return;
        await setGroup({ passphrase: passDraft.trim() });
        ls.set(LOCAL_KEYS.unlocked, passDraft.trim());
        alert('Passphrase rotated. Share the new one with your roommates.');
      }
      async function saveThresholds() {
        await setGroup({ thresholds: thresholdDraft });
        alert('Thresholds updated.');
      }
      async function resetCounter() {
        if (!confirm('Reset the monthly API counter to 0?')) return;
        await setGroup({ api_calls_used: 0, api_calls_reset_at: new Date().toISOString() });
      }
      async function transferAdmin() {
        if (!confirm('Make this device the admin? The old admin will lose admin privileges.')) return;
        await setGroup({ admin_device_id: deviceId });
      }

      async function updateRm(rm, patch) {
        const oldCommute = rm.commute_address || '';
        const updated = { ...rm, ...patch };
        await db.upsertRoommate(updated);
        await setRoommates();
        if (patch.commute_address && patch.commute_address !== oldCommute) {
          await onCommuteChange(updated.name, patch.commute_address, oldCommute);
        }
      }
      async function removeRm(rm) {
        if (!confirm(`Remove ${rm.name} from the group?`)) return;
        await db.deleteRoommate(rm.id);
        await setRoommates();
      }
      async function addRm() {
        if (!newName.trim()) return;
        const exists = roommates.find(r => r.name.toLowerCase() === newName.trim().toLowerCase());
        if (exists) { alert('A roommate with that name already exists.'); return; }
        await db.upsertRoommate({ group_id: group.id, name: newName.trim(), commute_address: newCommute.trim() });
        setNewName(''); setNewCommute('');
        await setRoommates();
      }

      function copyPassphrase() {
        navigator.clipboard.writeText(group.passphrase).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      }

      return (
        <main style={styles.main}>
          <Section title="your name">
            <input value={me || ''} onChange={e => onChangeMe(e.target.value)} style={styles.input} />
            <p style={styles.helpText}>how you appear in ratings and comments. local to this device.</p>
          </Section>

          <Section title="group passphrase">
            <div style={styles.passDisplay}>
              <code style={styles.passCode}>{group.passphrase}</code>
              <button onClick={copyPassphrase} style={styles.iconBtnFilled} aria-label="copy">
                {copied ? <IconCheck size={14} /> : <IconCopy size={14} />}
              </button>
            </div>
            <p style={styles.helpText}>share with your roommates so they can unlock the app.</p>
            {isAdmin && (
              <details style={{ marginTop: 12 }}>
                <summary style={{ fontSize: 13, color: 'var(--muted)', cursor: 'pointer' }}>rotate passphrase</summary>
                <div style={{ marginTop: 8 }}>
                  <input value={passDraft} onChange={e => setPassDraft(e.target.value)} style={styles.input} placeholder="new passphrase" />
                  <button onClick={rotatePassphrase} style={{ ...styles.primaryBtn, marginTop: 8, width: '100%' }}>rotate (kicks everyone out)</button>
                </div>
              </details>
            )}
          </Section>

          <Section title="roommates">
            {roommates.map(rm => (
              <RoommateRow key={rm.id} rm={rm} canEdit={isAdmin || rm.name === me} onUpdate={updateRm} onRemove={removeRm} />
            ))}
            {isAdmin && (
              <div style={{ ...styles.rmRow, marginTop: 6 }}>
                <input value={newName} onChange={e => setNewName(e.target.value)} style={{ ...styles.input, flex: 1 }} placeholder="add name" />
                <input value={newCommute} onChange={e => setNewCommute(e.target.value)} style={{ ...styles.input, flex: 2 }} placeholder="commute address" />
                <button onClick={addRm} style={styles.iconBtnFilled}><IconPlus size={14} /></button>
              </div>
            )}
          </Section>

          <Section title={`API usage this month`}>
            <div style={styles.apiBar}>
              <div style={{ ...styles.apiBarFill, width: callsPct + '%', background: callsPct >= 100 ? 'var(--danger)' : callsPct >= 80 ? 'var(--warn)' : 'var(--good)' }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginTop: 6 }}>
              <span>{callsUsed.toLocaleString()} / {API_CAP.toLocaleString()} calls</span>
              <span style={{ color: 'var(--muted)' }}>resets monthly</span>
            </div>
            {callsUsed >= API_CAP && (
              <div style={{ ...styles.helpText, background: 'var(--danger-soft)', padding: 10, borderRadius: 8, color: 'var(--danger)', marginTop: 10 }}>
                cap reached. drive times for new listings will show "—" until next month.
              </div>
            )}
            {isAdmin && (
              <button onClick={resetCounter} style={{ ...styles.secondaryBtn, marginTop: 10, width: '100%' }}>reset counter</button>
            )}
          </Section>

          <Section title="Google Maps API key">
            {isAdmin ? (
              <>
                <div style={{ position: 'relative' }}>
                  <input
                    type={showKey ? 'text' : 'password'}
                    value={keyDraft}
                    onChange={e => setKeyDraft(e.target.value)}
                    style={{ ...styles.input, paddingRight: 44 }}
                    placeholder="AIzaSy..."
                  />
                  <button onClick={() => setShowKey(!showKey)} style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', padding: 6, color: 'var(--muted)' }}>
                    {showKey ? <IconEyeOff size={16} /> : <IconEye size={16} />}
                  </button>
                </div>
                <button onClick={saveKey} style={{ ...styles.primaryBtn, marginTop: 8, width: '100%' }}>save key</button>
                <p style={styles.helpText}>enables drive-time calculations. enable Distance Matrix + Geocoding APIs in Google Cloud Console.</p>
              </>
            ) : (
              <p style={styles.helpText}>{group.api_key ? '✓ API key configured by admin' : 'no API key yet — ask admin to set one'}</p>
            )}
          </Section>

          <Section title="deal-breaker thresholds">
            {isAdmin ? (
              <>
                <ThresholdSlider label="max $/person/mo" value={thresholdDraft.maxRentPerPerson} min={400} max={1500} step={25}

                <ThresholdSlider label="min sqft/person" value={thresholdDraft.minSqftPerPerson} min={200} max={800} step={25}
                  onChange={v => setThresholdDraft({ ...thresholdDraft, minSqftPerPerson: v })} format={v => v + ' sqft'} />
                <ThresholdSlider label="max beds sharing one bath" value={thresholdDraft.maxBedsPerBath} min={1} max={4} step={1}
                  onChange={v => setThresholdDraft({ ...thresholdDraft, maxBedsPerBath: v })} format={v => v + (v === 1 ? ' bed' : ' beds')} />
                <ThresholdSlider label="min beds" value={thresholdDraft.minBeds} min={1} max={5} step={1}
                  onChange={v => setThresholdDraft({ ...thresholdDraft, minBeds: v })} format={v => v + ' beds'} />

              <div style={styles.helpText}>
                <div>max $/person: ${group.thresholds.maxRentPerPerson}</div>
                <div>min sqft/person: {group.thresholds.minSqftPerPerson}</div>
                <div>max beds per bath: {group.thresholds.maxBedsPerBath}</div>
                <div>min beds: {group.thresholds.minBeds}</div>

          {!isAdmin && (
            <Section title="admin">
              <p style={styles.helpText}>another device is currently admin. you can claim admin if you know the passphrase.</p>

          <Section title="about">

              <div>{listings.length} listing{listings.length === 1 ? '' : 's'} · {roommates.length} roommate{roommates.length === 1 ? '' : 's'}</div>

            <button

    function RoommateRow({ rm, canEdit, onUpdate, onRemove }) {
      const [name, setName] = useState(rm.name);
      const [commute, setCommute] = useState(rm.commute_address || '');
      const [maxCommute, setMaxCommute] = useState(rm.max_commute_minutes ?? 45);
      const [dirty, setDirty] = useState(false);

      useEffect(() => {
        setName(rm.name);
        setCommute(rm.commute_address || '');
        setMaxCommute(rm.max_commute_minutes ?? 45);
        setDirty(false);
      }, [rm.name, rm.commute_address, rm.max_commute_minutes]);

      async function save() {
        await onUpdate(rm, {
          name: name.trim(),
          commute_address: commute.trim(),
          max_commute_minutes: Number(maxCommute),
        });
        setDirty(false);
      }

      return (
        <div style={{ marginBottom: 14, padding: '12px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12 }}>
          <div style={styles.rmRow}>
            <input
              value={name}
              onChange={e => { setName(e.target.value); setDirty(true); }}
              style={{ ...styles.input, flex: 1 }}
              disabled={!canEdit}
              placeholder="name"
            />
            {canEdit && <button onClick={() => onRemove(rm)} style={styles.iconBtn}><IconX size={14} /></button>}
          </div>
          <div style={{ ...styles.rmRow, marginTop: 6 }}>
            <input
              value={commute}
              onChange={e => { setCommute(e.target.value); setDirty(true); }}
              style={{ ...styles.input, flex: 1 }}
              disabled={!canEdit}
              placeholder="commute address"
            />
          </div>
          <div style={{ marginTop: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
              <span style={styles.filterLabel}>max commute time</span>
              <span style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 600 }}>{maxCommute} min</span>
            </div>
            <input
              type="range"
              min="5" max="120" step="5"
              value={maxCommute}
              disabled={!canEdit}
              onChange={e => { setMaxCommute(Number(e.target.value)); setDirty(true); }}
            />
          </div>
          {canEdit && dirty && (
            <button onClick={save} style={{ ...styles.primaryBtn, marginTop: 10, width: '100%' }}>
              <IconCheck size={14} /> save changes
            </button>
          )}
        </div>
      );
    }

    function ThresholdSlider({ label, value, min, max, step, onChange, format }) {
      return (
        <div style={{ marginBottom: 16 }}>

            <div style={styles.filterLabel}>{label}</div>
            <div style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 600 }}>{format(value)}</div>
          </div>
          <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} />
        </div>
      );
    }
